# ============================================================
# docker-compose.hub.yml
# Docker Hub에서 FastAPI 이미지를 받아서 실행하는 버전
# 팀원 배포용 — git clone, 빌드 과정 없음
#
# 실행: docker compose -f docker-compose.hub.yml up -d
# 종료: docker compose -f docker-compose.hub.yml down
# 초기화: docker compose -f docker-compose.hub.yml down -v
# ============================================================

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: es01
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m    # RAM 8GB 이하라면 -Xms256m -Xmx256m 으로 변경
      - xpack.security.enabled=false
      - cluster.name=docker-cluster
      - bootstrap.memory_lock=true
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile:  { soft: 65536, hard: 65536 }
    volumes:
      - esdata:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: >
        curl -sf http://localhost:9200/_cluster/health |
        grep -q '"status":"green"\|"status":"yellow"'
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1.5G

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: kibana01
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: curl -sf http://localhost:5601/api/status | grep -q '"level":"available"'
      interval: 30s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M

  api:
    # build: 없음 — Docker Hub에서 이미지를 직접 받아서 실행
    image: juyeon09/elk-fastapi:latest
    container_name: fastapi01
    environment:
      - ES_HOST=http://elasticsearch:9200
      - APP_ENV=development
      - LOG_LEVEL=info
    ports:
      - "8000:8000"
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

volumes:
  esdata:
    driver: local
